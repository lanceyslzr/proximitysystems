<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#1a6b5a"/>
<title>Family Portal — Proximity Care</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f6f3ee;--white:#ffffff;--dark:#1a1a18;
  --green:#1a6b5a;--green-l:#e8f5f1;--green-b:#c8e6dc;--green-d:#0f4a3d;
  --muted:#7a7a72;--border:#e2ddd4;--shadow:rgba(0,0,0,0.06);
  --teal:#3d7a8a;--teal-l:#e8f3f5;
}
html,body{min-height:100vh;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased;}

/* PIN GATE */
.gate{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.gate.hide{display:none;}
.gate-inner{width:100%;max-width:380px;}
.gate-brand{font-family:'Lora',serif;font-size:22px;font-weight:500;color:var(--dark);text-align:center;margin-bottom:4px;}
.gate-brand em{color:var(--green);font-style:italic;}
.gate-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:40px;}
.gate-card{background:var(--white);border-radius:20px;padding:36px 28px;box-shadow:0 8px 40px var(--shadow);}
.gate-icon{width:56px;height:56px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;}
.gate-title{font-family:'Lora',serif;font-size:22px;text-align:center;margin-bottom:6px;}
.gate-hint{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all 0.2s;}
.pin-dot.filled{background:var(--green);border-color:var(--green);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:16px;font-size:20px;font-weight:500;font-family:'Poppins',sans-serif;color:var(--dark);cursor:pointer;transition:all 0.15s;text-align:center;}
.pin-btn:hover{background:var(--green-l);border-color:var(--green);}
.pin-btn:active{transform:scale(0.95);}
.pin-btn.del{font-size:16px;color:var(--muted);}
.pin-btn.empty{background:none;border:none;cursor:default;}
.pin-error{text-align:center;font-size:13px;color:#e05a6a;margin-top:16px;opacity:0;transition:opacity 0.2s;min-height:20px;}
.pin-error.show{opacity:1;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.app.show{display:flex;}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.tb-brand{font-family:'Lora',serif;font-size:17px;font-weight:500;}
.tb-brand em{color:var(--green);font-style:italic;}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-name{font-size:13px;color:var(--muted);}
.tb-signout{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;padding:6px 10px;border-radius:6px;font-family:'Poppins',sans-serif;transition:color 0.15s;}
.tb-signout:hover{color:var(--dark);}

/* CONTENT */
.content{flex:1;padding:20px;max-width:560px;margin:0 auto;width:100%;}

/* STATUS CARD */
.status-card{background:var(--green);border-radius:18px;padding:24px;margin-bottom:16px;color:white;position:relative;overflow:hidden;}
.status-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06);}
.status-eyebrow{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.7;margin-bottom:6px;}
.status-name{font-family:'Lora',serif;font-size:24px;font-weight:500;margin-bottom:4px;}
.status-detail{font-size:13px;opacity:0.8;line-height:1.5;}
.status-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:100px;padding:5px 12px;font-size:12px;margin-top:12px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#7dffb3;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* SECTION */
.section{margin-bottom:16px;}
.section-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding:0 2px;}

/* CARDS */
.card{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);}
.card-row:last-child{border:none;}
.card-row-label{font-size:13px;color:var(--muted);}
.card-row-value{font-size:14px;font-weight:500;text-align:right;}
.card-row-value.green{color:var(--green);}

/* PSW CARD */
.psw-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 2px 12px var(--shadow);display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.psw-avatar{width:56px;height:56px;border-radius:50%;background:var(--green-l);border:2px solid var(--green-b);display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:20px;color:var(--green);font-weight:500;flex-shrink:0;}
.psw-info{flex:1;}
.psw-name{font-size:16px;font-weight:600;margin-bottom:2px;}
.psw-title{font-size:12px;color:var(--muted);}
.psw-schedule{font-size:12px;color:var(--green);margin-top:4px;}

/* VISIT ROWS */
.visit-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:14px;}
.visit-row:last-child{border:none;}
.visit-date-box{width:44px;text-align:center;flex-shrink:0;}
.visit-date-day{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.visit-date-num{font-family:'Lora',serif;font-size:22px;color:var(--dark);line-height:1;}
.visit-info{flex:1;}
.visit-psw{font-size:14px;font-weight:500;}
.visit-time{font-size:12px;color:var(--muted);margin-top:2px;}
.visit-hours{font-size:13px;font-weight:600;color:var(--green);}

/* DOCS */
.doc-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:12px;text-decoration:none;color:inherit;}
.doc-row:last-child{border:none;}
.doc-icon{width:36px;height:36px;border-radius:10px;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.doc-info{flex:1;}
.doc-name{font-size:14px;font-weight:500;}
.doc-type{font-size:12px;color:var(--muted);margin-top:1px;}
.doc-arrow{font-size:16px;color:var(--muted);}

/* INVOICE ROWS */
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.inv-row:last-child{border:none;}
.inv-month{font-size:14px;font-weight:500;}
.inv-right{text-align:right;}
.inv-amount{font-size:14px;font-weight:600;color:var(--green);}
.inv-status{font-size:11px;color:var(--muted);margin-top:2px;}

/* MESSAGE */
.msg-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 2px 12px var(--shadow);}
.msg-label{font-size:13px;color:var(--muted);margin-bottom:10px;}
.msg-ta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Poppins',sans-serif;color:var(--dark);outline:none;resize:none;min-height:80px;transition:border-color 0.2s;}
.msg-ta:focus{border-color:var(--green);}
.msg-btn{margin-top:10px;background:var(--green);border:none;border-radius:10px;padding:12px 20px;color:white;font-size:13px;font-weight:500;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.2s;width:100%;}
.msg-btn:hover{background:var(--green-d);}
.msg-sent{font-size:13px;color:var(--green);text-align:center;margin-top:8px;display:none;}

/* CARE PLAN */
.plan-text{padding:18px;font-size:14px;color:var(--dark);line-height:1.75;font-family:'Lora',serif;}

/* EMPTY */
.empty{padding:32px;text-align:center;color:var(--muted);font-size:13px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--muted);}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:10;}
.nav-btn{flex:1;padding:12px 4px 16px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Poppins',sans-serif;transition:color 0.15s;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;letter-spacing:0.02em;color:var(--muted);}
.nav-btn.on .nav-label{color:var(--green);}
.nav-btn.on .nav-icon{filter:none;}

.tab{display:none;padding-bottom:80px;}
.tab.on{display:block;}
</style>
</head>
<body>

<!-- PIN GATE -->
<div class="gate" id="gate">
  <div class="gate-inner">
    <div class="gate-brand">Proximity <em>Care</em></div>
    <div class="gate-sub">Family Portal</div>
    <div class="gate-card">
      <div class="gate-icon">🏠</div>
      <div class="gate-title">Welcome back.</div>
      <div class="gate-hint">Enter your 4-digit access code to view your care portal.</div>
      <div class="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn empty"></button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn del" onclick="pinDel()">⌫</button>
      </div>
      <div class="pin-error" id="pinError">Wrong code. Try again.</div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="tb-brand">Proximity <em>Care</em></div>
    <div class="tb-right">
      <span class="tb-name" id="tbName"></span>
      <button class="tb-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="content" id="contentArea">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading your portal...</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn on" id="nav-home" onclick="showTab('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" id="nav-visits" onclick="showTab('visits')">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Visits</span>
    </button>
    <button class="nav-btn" id="nav-care" onclick="showTab('care')">
      <span class="nav-icon">💚</span>
      <span class="nav-label">Care Plan</span>
    </button>
    <button class="nav-btn" id="nav-docs" onclick="showTab('docs')">
      <span class="nav-icon">📄</span>
      <span class="nav-label">Documents</span>
    </button>
    <button class="nav-btn" id="nav-billing" onclick="showTab('billing')">
      <span class="nav-icon">💳</span>
      <span class="nav-label">Billing</span>
    </button>
  </nav>
</div>

<script>
const R = 'https://proximity-agent-production.up.railway.app';
let slug = '', pinVal = '', portalData = null;

// Get slug from URL
const params = new URLSearchParams(window.location.search);
slug = params.get('c') || '';

// PIN LOGIC
function pinPress(d) {
  if (pinVal.length >= 4) return;
  pinVal += d;
  updateDots();
  if (pinVal.length === 4) setTimeout(verifyPin, 200);
}

function pinDel() {
  pinVal = pinVal.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinVal.length);
  }
}

async function verifyPin() {
  try {
    const r = await fetch(`${R}/family/verify-pin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, pin: pinVal })
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('gate').classList.add('hide');
      document.getElementById('app').classList.add('show');
      document.getElementById('tbName').textContent = d.client.first_name + ' ' + d.client.last_name;
      loadPortal();
    } else {
      showPinError();
    }
  } catch (e) {
    showPinError();
  }
}

function showPinError() {
  document.getElementById('pinError').classList.add('show');
  pinVal = '';
  updateDots();
  setTimeout(() => document.getElementById('pinError').classList.remove('show'), 2500);
}

function signOut() {
  pinVal = '';
  updateDots();
  portalData = null;
  document.getElementById('gate').classList.remove('hide');
  document.getElementById('app').classList.remove('show');
}

// LOAD PORTAL
async function loadPortal() {
  try {
    const r = await fetch(`${R}/family/portal/${slug}`);
    portalData = await r.json();
    renderAll();
  } catch (e) {
    document.getElementById('contentArea').innerHTML = '<div class="empty">Could not load portal. Please try again.</div>';
  }
}

function renderAll() {
  showTab('home');
}

// TABS
function showTab(tab) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('nav-' + tab).classList.add('on');
  if (!portalData) return;

  const c = document.getElementById('contentArea');

  if (tab === 'home') {
    const { client, psw, today_visit, visits } = portalData;
    const lastVisit = visits && visits.length > 0 ? visits[0] : null;
    const statusMsg = today_visit
      ? `Visit in progress today — ${today_visit.time_in ? today_visit.time_in.slice(0,5) : ''} to ${today_visit.time_out ? today_visit.time_out.slice(0,5) : 'ongoing'}`
      : lastVisit
      ? `Last visit: ${fmtDate(lastVisit.visit_date)}`
      : 'No visits logged yet';

    c.innerHTML = `
      <div class="status-card">
        <div class="status-eyebrow">Your loved one</div>
        <div class="status-name">${client.first_name} ${client.last_name}</div>
        <div class="status-detail">${client.schedule || 'Schedule on file'}</div>
        <div class="status-badge"><span class="status-dot"></span>${statusMsg}</div>
      </div>

      <div class="section">
        <div class="section-title">Your Caregiver</div>
        <div class="psw-card">
          <div class="psw-avatar">${(psw.name || 'C').charAt(0)}</div>
          <div class="psw-info">
            <div class="psw-name">${psw.name}</div>
            <div class="psw-title">${psw.title}</div>
            <div class="psw-schedule">${client.schedule || ''}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Recent Visits</div>
        <div class="card">
          ${(visits || []).slice(0, 3).map(v => visitRow(v)).join('') || '<div class="empty">No visits yet</div>'}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Send a Message</div>
        <div class="msg-card">
          <div class="msg-label">Message Lance directly</div>
          <textarea class="msg-ta" id="msgTa" placeholder="Type your message here..."></textarea>
          <button class="msg-btn" onclick="sendMsg()">Send Message</button>
          <div class="msg-sent" id="msgSent">✓ Message sent. Lance will reply shortly.</div>
        </div>
      </div>`;
  }

  else if (tab === 'visits') {
    const { visits } = portalData;
    c.innerHTML = `
      <div class="section">
        <div class="section-title">All Visits</div>
        <div class="card">
          ${(visits || []).length > 0
            ? visits.map(v => visitRow(v)).join('')
            : '<div class="empty">No visits logged yet</div>'}
        </div>
      </div>`;
  }

  else if (tab === 'care') {
    const { client } = portalData;
    c.innerHTML = `
      <div class="section">
        <div class="section-title">Care Plan</div>
        <div class="card">
          <div class="plan-text">${client.care_plan || 'Care plan not set yet. Lance will update this shortly.'}</div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Schedule</div>
        <div class="card">
          <div class="card-row"><span class="card-row-label">Days</span><span class="card-row-value">Monday to Friday</span></div>
          <div class="card-row"><span class="card-row-label">Hours</span><span class="card-row-value">9:00 AM to 5:00 PM</span></div>
          <div class="card-row"><span class="card-row-label">Caregiver</span><span class="card-row-value green">Carolina Hermida</span></div>
          <div class="card-row"><span class="card-row-label">Since</span><span class="card-row-value">${client.start_date ? fmtDate(client.start_date) : 'On file'}</span></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Contact</div>
        <div class="card">
          <div class="card-row"><span class="card-row-label">Lance Salazar</span><span class="card-row-value green">647-382-8047</span></div>
          <div class="card-row"><span class="card-row-label">Email</span><span class="card-row-value" style="font-size:12px;">healthcareproximity@gmail.com</span></div>
        </div>
      </div>`;
  }

  else if (tab === 'docs') {
    const { documents, psw } = portalData;
    c.innerHTML = `
      <div class="section">
        <div class="section-title">${psw.name} — Documents</div>
        <div class="card">
          ${documents && documents.length > 0
            ? documents.map(d => `
              <a href="${d.file_url}" target="_blank" class="doc-row">
                <div class="doc-icon">${docIcon(d.document_type)}</div>
                <div class="doc-info">
                  <div class="doc-name">${d.file_name || d.document_type}</div>
                  <div class="doc-type">${d.document_type || 'Document'}</div>
                </div>
                <div class="doc-arrow">→</div>
              </a>`).join('')
            : '<div class="empty">Documents will appear here once uploaded by Lance.</div>'}
        </div>
      </div>`;
  }

  else if (tab === 'billing') {
    const { invoices } = portalData;
    c.innerHTML = `
      <div class="section">
        <div class="section-title">Invoice History</div>
        <div class="card">
          ${invoices && invoices.length > 0
            ? invoices.map(inv => `
              <div class="inv-row">
                <div>
                  <div class="inv-month">${inv.month} ${inv.year}</div>
                  <div style="font-size:12px;color:var(--muted);margin-top:2px;">${inv.total_hours} hours</div>
                </div>
                <div class="inv-right">
                  <div class="inv-amount">$${parseFloat(inv.client_total).toFixed(2)}</div>
                  <div class="inv-status">${inv.status === 'sent' ? 'Invoice sent' : inv.status}</div>
                </div>
              </div>`).join('')
            : '<div class="empty">No invoices yet. First invoice arrives end of month.</div>'}
        </div>
      </div>
      <div class="section">
        <div class="section-title">Payment</div>
        <div class="card">
          <div class="card-row"><span class="card-row-label">Rate</span><span class="card-row-value">$22.00 / hour</span></div>
          <div class="card-row"><span class="card-row-label">E-transfer to</span><span class="card-row-value green" style="font-size:13px;">lancesalazar56@yahoo.ca</span></div>
          <div class="card-row"><span class="card-row-label">Due</span><span class="card-row-value">First of the month</span></div>
        </div>
      </div>`;
  }
}

// HELPERS
function visitRow(v) {
  const d = new Date((v.visit_date || '') + 'T12:00:00');
  const day = d.toLocaleDateString('en-CA', { weekday: 'short' });
  const num = d.getDate();
  const hrs = parseFloat(v.hours_worked || 0).toFixed(1);
  const tin = v.time_in ? String(v.time_in).slice(0,5) : '';
  const tout = v.time_out ? String(v.time_out).slice(0,5) : '';
  return `<div class="visit-row">
    <div class="visit-date-box">
      <div class="visit-date-day">${day}</div>
      <div class="visit-date-num">${num}</div>
    </div>
    <div class="visit-info">
      <div class="visit-psw">${v.psw_name || 'Carolina'}</div>
      <div class="visit-time">${tin}${tout ? ' – ' + tout : ''}</div>
    </div>
    <div class="visit-hours">${hrs} hrs</div>
  </div>`;
}

function docIcon(type) {
  const t = (type || '').toLowerCase();
  if (t.includes('resume') || t.includes('cv')) return '📄';
  if (t.includes('cpr') || t.includes('cert')) return '🏥';
  if (t.includes('photo') || t.includes('id')) return '🪪';
  return '📎';
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function sendMsg() {
  const ta = document.getElementById('msgTa');
  const msg = ta?.value?.trim();
  if (!msg) return;
  try {
    await fetch('https://formspree.io/f/xdoqgbqg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, from: 'Family Portal — ' + slug })
    });
  } catch (e) {}
  ta.value = '';
  const s = document.getElementById('msgSent');
  if (s) { s.style.display = 'block'; setTimeout(() => s.style.display = 'none', 3000); }
}
</script>
