<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Proximity Care Services — Chat With Us</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f6f3ee;
    --accent: #3d7a8a;
    --accent-light: #5a9aaa;
    --accent-pale: rgba(61,122,138,0.08);
    --accent-glow: rgba(61,122,138,0.15);
    --dark: #1c1c1c;
    --dark2: #2a2a2a;
    --white: #ffffff;
    --cream: #faf8f4;
    --muted: #7a7a72;
    --border: #e2ddd4;
    --green: #5a8a6a;
    --text: #1e2420;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  html, body {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* LAYOUT */
  .chat-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 600px;
    margin: 0 auto;
    background: var(--white);
    box-shadow: 0 0 60px rgba(0,0,0,0.08);
  }

  /* HEADER */
  .chat-header {
    background: var(--dark);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .chat-avatar svg {
    width: 22px;
    height: 22px;
    fill: var(--white);
  }
  .chat-avatar::after {
    content: '';
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid var(--dark);
  }
  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-name {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0.5px;
  }
  .chat-header-name em { color: var(--accent-light); font-style: italic; }
  .chat-header-status {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(90,138,106,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(90,138,106,0); }
  }

  /* MESSAGES AREA */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--bg);
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* MESSAGE BUBBLES */
  .msg {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.assistant { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .msg.assistant .msg-avatar { background: var(--accent); }
  .msg.assistant .msg-avatar svg { width: 14px; height: 14px; fill: var(--white); }
  .msg.user .msg-avatar { display: none; }
  .msg-bubble {
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 16px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .msg.assistant .msg-bubble {
    background: var(--white);
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .msg.user .msg-bubble {
    background: var(--accent);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }
  .msg-bubble a {
    color: var(--accent);
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .msg.user .msg-bubble a { color: #c8dde2; }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .msg-bubble li { margin-bottom: 4px; }
  .msg-bubble strong { font-weight: 600; }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    gap: 10px;
    align-self: flex-start;
    max-width: 88%;
    animation: msgIn 0.3s ease;
  }
  .typing .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .typing .msg-avatar svg { width: 14px; height: 14px; fill: var(--white); }
  .typing-dots {
    background: var(--white);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.4;
    animation: typingBounce 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 12px;
    background: var(--bg);
  }
  .quick-reply {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-reply:hover {
    background: var(--accent);
    color: var(--white);
    border-color: var(--accent);
  }

  /* INPUT AREA */
  .chat-input-wrap {
    padding: 16px 20px;
    background: var(--white);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: var(--muted); }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .chat-send:hover { background: var(--accent-light); }
  .chat-send:active { transform: scale(0.94); }
  .chat-send:disabled { background: var(--border); cursor: not-allowed; }
  .chat-send svg { width: 20px; height: 20px; fill: var(--white); }
  .chat-disclaimer {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    line-height: 1.4;
  }

  /* STAGE CHIPS */
  .stage-chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 12px;}
  .stage-chip{font-size:13px;padding:8px 14px;background:var(--cream);border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text);transition:all .2s;line-height:1.3;text-decoration:none;}
  .stage-chip:hover{background:var(--accent);color:var(--white);border-color:var(--accent);}
  .stage-chip.cta{background:var(--accent);color:var(--white);border-color:var(--accent);}
  .stage-chip.cta:hover{background:var(--accent-light);}

  /* BOOKING FORM */
  .booking-form {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    padding: 20px;
    max-width: 88%;
    animation: msgIn 0.3s ease;
    margin-left: 40px;
  }
  .booking-form-title {
    font-family: 'Lora', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--dark);
    margin-bottom: 16px;
  }
  .booking-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: block;
  }
  .booking-dates {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .booking-date {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }
  .booking-date:hover { border-color: var(--accent); color: var(--accent); }
  .booking-date.selected { background: var(--accent); color: var(--white); border-color: var(--accent); }
  .booking-date .day-name { display: block; font-size: 10px; font-weight: 500; }
  .booking-date .day-num { display: block; font-size: 13px; font-weight: 600; }
  .booking-times {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .booking-time {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .booking-time:hover { border-color: var(--accent); color: var(--accent); }
  .booking-time.selected { background: var(--accent); color: var(--white); border-color: var(--accent); }
  .booking-confirm {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .booking-confirm:hover { background: var(--accent-light); }
  .booking-confirm:disabled { background: var(--border); cursor: not-allowed; }
  .booking-confirmed {
    text-align: center;
    padding: 8px 0 0;
    font-size: 13px;
    color: var(--green);
    font-weight: 500;
    display: none;
  }
  @media (max-width: 600px) {
    .booking-form { max-width: 92%; margin-left: 0; padding: 16px; }
  }

  /* ERROR BANNER */
  .error-banner {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    font-size: 13px;
    padding: 10px 16px;
    margin: 0 20px 8px;
    border-radius: 8px;
    display: none;
  }
  .error-banner.visible { display: block; }

  /* RESPONSIVE */
  @media (min-width: 601px) {
    body { padding: 0; }
    .chat-app {
      height: 100vh;
      height: 100dvh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
  }
  @media (max-width: 600px) {
    .chat-app { max-width: 100%; }
    .chat-header { padding: 16px 16px; gap: 12px; }
    .chat-messages { padding: 16px 14px; gap: 12px; }
    .chat-input-wrap { padding: 12px 14px; }
    .quick-replies { padding: 0 14px 8px; }
    .msg { max-width: 92%; }
    .chat-avatar { width: 38px; height: 38px; }
  }
</style>
</head>
<body>

<div class="chat-app">
  <!-- HEADER -->
  <div class="chat-header">
    <div class="chat-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <div class="chat-header-info">
      <div class="chat-header-name">Proximity <em>Care Systems</em></div>
      <div class="chat-header-status">
        <span class="status-dot"></span>
        Online now — here to help
      </div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- QUICK REPLIES -->
  <div class="quick-replies" id="quickReplies"></div>
  <div class="stage-chips" id="stageChips"></div>

  <!-- ERROR -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- INPUT -->
  <div class="chat-input-wrap">
    <div class="chat-input-row">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type your message..." autocomplete="off"></textarea>
      <button class="chat-send" id="chatSend" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── CHATBOT — PURE INTAKE STATE MACHINE ──
var chatStage=0;
var intake={role:'',painPoint:'',size:'',name:'',contact:'',day:'',time:''};
var chatHistory=[];

var STAGE_EXPECTED=[
  ['Yes I do','I\'m looking into it','I work at one'],
  ['Missed leads','Too much admin','No family communication','Billing and invoicing'],
  ['Under 10','10 to 30','30 to 100','100+'],
  null,
  null,
  ['Monday','Tuesday','Wednesday','Thursday','Friday'],
  ['Morning 9-12','Afternoon 12-4','Evening 4-7']
];

var STAGE_PROMPTS=[
  {q:'What is the biggest thing eating your time right now?',chips:['Missed leads','Too much admin','No family communication','Billing and invoicing']},
  {q:'How many clients are you currently serving?',chips:['Under 10','10 to 30','30 to 100','100+']},
  {q:'What is your name?',chips:null},
  {q:'Best email or phone to reach you?',chips:null},
  {q:'What day works best for a quick discovery call?',chips:['Monday','Tuesday','Wednesday','Thursday','Friday']},
  {q:'What time works?',chips:['Morning 9-12','Afternoon 12-4','Evening 4-7']}
];

var messagesEl=document.getElementById('chatMessages');
var inputEl=document.getElementById('chatInput');
var sendBtn=document.getElementById('chatSend');
var chipsEl=document.getElementById('stageChips');

var botAvatarSVG='<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';

function scrollToBottom(){requestAnimationFrame(function(){messagesEl.scrollTop=messagesEl.scrollHeight;});}

function addMessage(role,text){
  text=text.replace(/\*\*(.+?)\*\*/g,'$1');
  var div=document.createElement('div');div.className='msg '+role;
  if(role==='assistant'){
    div.innerHTML='<div class="msg-avatar">'+botAvatarSVG+'</div><div class="msg-bubble">'+text.replace(/\n/g,'<br>')+'</div>';
  }else{
    div.innerHTML='<div class="msg-bubble">'+text.replace(/\n/g,'<br>')+'</div>';
  }
  messagesEl.appendChild(div);scrollToBottom();
}

function renderChips(chips){
  chipsEl.innerHTML='';
  if(!chips||!chips.length)return;
  chips.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='stage-chip';btn.textContent=c;
    btn.addEventListener('click',function(){handleInput(c);});
    chipsEl.appendChild(btn);
  });
}

function advanceStage(answer){
  if(chatStage===0) intake.role=answer;
  else if(chatStage===1) intake.painPoint=answer;
  else if(chatStage===2) intake.size=answer;
  else if(chatStage===3) intake.name=answer;
  else if(chatStage===4) intake.contact=answer;
  else if(chatStage===5) intake.day=answer;
  else if(chatStage===6) intake.time=answer;

  chatStage++;

  if(chatStage<=6){
    var s=STAGE_PROMPTS[chatStage-1];
    setTimeout(function(){addMessage('assistant',s.q);chatHistory.push({role:'assistant',content:s.q});renderChips(s.chips);scrollToBottom();},500);
  }else{
    setTimeout(function(){
      addMessage('assistant','Perfect '+intake.name+'. You are booked for '+intake.day+' '+intake.time+'. Lance will call you at '+intake.contact+' to walk you through exactly what this looks like for your agency.');
      renderChips(null);
      var nm=intake.name.split(/\s+/);
      fetch('https://proximity-agent-production.up.railway.app/webhook/lead',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          operator_id:'proximity-systems',
          first_name:nm.shift()||'',
          last_name:nm.join(' '),
          phone:intake.contact,
          email:intake.contact.includes('@')?intake.contact:'',
          care_type_interest:intake.painPoint,
          care_needed_for:intake.role+' — '+intake.size+' clients',
          urgency:'asap',
          source:'chatbot_booking',
          preferred_time:intake.day+' '+intake.time
        })
      }).catch(function(e){console.error('Booking webhook error:',e);});
    },500);
  }
}

async function handleInput(text){
  var isExpected=STAGE_EXPECTED[chatStage]===null||STAGE_EXPECTED[chatStage].includes(text);
  var isFreeform=text.includes('?')||text.length>40||!isExpected;

  if(isFreeform){
    addMessage('user',text);
    chatHistory.push({role:'user',content:text});
    chipsEl.innerHTML='';
    try{
      var r=await fetch('https://proximity-agent-production.up.railway.app/chat',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({operator_id:'proximity-systems',messages:chatHistory})
      });
      var d=await r.json();
      var reply=d.response||'Reach Lance directly at 647-382-8047.';
      chatHistory.push({role:'assistant',content:reply});
      addMessage('assistant',reply);
    }catch(e){
      addMessage('assistant','Reach Lance directly at 647-382-8047.');
    }
    renderChips(STAGE_EXPECTED[chatStage]||null);
    return;
  }

  addMessage('user',text);
  chatHistory.push({role:'user',content:text});
  advanceStage(text);
}

function sendMessage(){
  var msg=inputEl.value.trim();if(!msg)return;
  inputEl.value='';inputEl.style.height='auto';
  handleInput(msg);
}

sendBtn.addEventListener('click',sendMessage);
inputEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
inputEl.addEventListener('input',function(){inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';});

addMessage('assistant','Hey — do you run a home care agency?');
renderChips(['Yes I do','I\'m looking into it','I work at one']);
</script>
</body>
</html>
