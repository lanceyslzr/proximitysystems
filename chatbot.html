<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Proximity Care Services — Chat With Us</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f6f3ee;
    --accent: #3d7a8a;
    --accent-light: #5a9aaa;
    --accent-pale: rgba(61,122,138,0.08);
    --accent-glow: rgba(61,122,138,0.15);
    --dark: #1c1c1c;
    --dark2: #2a2a2a;
    --white: #ffffff;
    --cream: #faf8f4;
    --muted: #7a7a72;
    --border: #e2ddd4;
    --green: #5a8a6a;
    --text: #1e2420;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  html, body {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* LAYOUT */
  .chat-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 600px;
    margin: 0 auto;
    background: var(--white);
    box-shadow: 0 0 60px rgba(0,0,0,0.08);
  }

  /* HEADER */
  .chat-header {
    background: var(--dark);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .chat-avatar svg {
    width: 22px;
    height: 22px;
    fill: var(--white);
  }
  .chat-avatar::after {
    content: '';
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid var(--dark);
  }
  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-name {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0.5px;
  }
  .chat-header-name em { color: var(--accent-light); font-style: italic; }
  .chat-header-status {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(90,138,106,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(90,138,106,0); }
  }

  /* MESSAGES AREA */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--bg);
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* MESSAGE BUBBLES */
  .msg {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.assistant { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .msg.assistant .msg-avatar { background: var(--accent); }
  .msg.assistant .msg-avatar svg { width: 14px; height: 14px; fill: var(--white); }
  .msg.user .msg-avatar { display: none; }
  .msg-bubble {
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 16px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .msg.assistant .msg-bubble {
    background: var(--white);
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .msg.user .msg-bubble {
    background: var(--accent);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }
  .msg-bubble a {
    color: var(--accent);
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .msg.user .msg-bubble a { color: #c8dde2; }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .msg-bubble li { margin-bottom: 4px; }
  .msg-bubble strong { font-weight: 600; }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    gap: 10px;
    align-self: flex-start;
    max-width: 88%;
    animation: msgIn 0.3s ease;
  }
  .typing .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .typing .msg-avatar svg { width: 14px; height: 14px; fill: var(--white); }
  .typing-dots {
    background: var(--white);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.4;
    animation: typingBounce 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 12px;
    background: var(--bg);
  }
  .quick-reply {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-reply:hover {
    background: var(--accent);
    color: var(--white);
    border-color: var(--accent);
  }

  /* INPUT AREA */
  .chat-input-wrap {
    padding: 16px 20px;
    background: var(--white);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: var(--muted); }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .chat-send:hover { background: var(--accent-light); }
  .chat-send:active { transform: scale(0.94); }
  .chat-send:disabled { background: var(--border); cursor: not-allowed; }
  .chat-send svg { width: 20px; height: 20px; fill: var(--white); }
  .chat-disclaimer {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    line-height: 1.4;
  }

  /* CALENDLY EMBED */
  .calendly-embed {
    background: var(--white);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    overflow: hidden;
    max-width: 88%;
    animation: msgIn 0.3s ease;
    margin-left: 40px;
  }
  .calendly-embed .calendly-inline-widget {
    min-width: 280px;
    height: 500px;
  }
  @media (max-width: 600px) {
    .calendly-embed { max-width: 92%; margin-left: 0; }
    .calendly-embed .calendly-inline-widget { height: 480px; }
  }

  /* ERROR BANNER */
  .error-banner {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    font-size: 13px;
    padding: 10px 16px;
    margin: 0 20px 8px;
    border-radius: 8px;
    display: none;
  }
  .error-banner.visible { display: block; }

  /* RESPONSIVE */
  @media (min-width: 601px) {
    body { padding: 0; }
    .chat-app {
      height: 100vh;
      height: 100dvh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
  }
  @media (max-width: 600px) {
    .chat-app { max-width: 100%; }
    .chat-header { padding: 16px 16px; gap: 12px; }
    .chat-messages { padding: 16px 14px; gap: 12px; }
    .chat-input-wrap { padding: 12px 14px; }
    .quick-replies { padding: 0 14px 8px; }
    .msg { max-width: 92%; }
    .chat-avatar { width: 38px; height: 38px; }
  }
</style>
</head>
<body>

<div class="chat-app">
  <!-- HEADER -->
  <div class="chat-header">
    <div class="chat-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <div class="chat-header-info">
      <div class="chat-header-name">Proximity <em>Care Systems</em></div>
      <div class="chat-header-status">
        <span class="status-dot"></span>
        Online now — here to help
      </div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- QUICK REPLIES -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- ERROR -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- INPUT -->
  <div class="chat-input-wrap">
    <div class="chat-input-row">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type your message..." autocomplete="off"></textarea>
      <button class="chat-send" id="chatSend" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="chat-disclaimer">
      This assistant provides general information. For medical emergencies, call 911.
    </div>
  </div>
</div>

<script>
// ─── CONFIGURATION ──────────────────────────────────────────
// Proxy URL — API key is handled server-side
const API_URL = 'https://young-meadow-e6fb.lancesalazar56.workers.dev';
const MODEL = 'claude-haiku-4-5-20251001';

const WEBHOOK_URL = 'https://hook.us2.make.com/gkus4m2lusfv3anug85pfjfedqpn9pju';

const SYSTEM_PROMPT = `You are the intake assistant for Proximity Care Systems, an AI automation agency that builds done-for-you automation systems for home care operators in Canada and the Philippines.

Your role:
- Qualify home care operators interested in automating their business
- Keep the conversation short and focused — maximum 5-6 exchanges total
- Answer questions about the 9-system stack when asked
- Collect their info and get them to a discovery call as fast as possible

The 9-System Automation Stack (share when asked):
1. PSW Timesheet System — PSWs log visits from their phone. Hours auto-calculate.
2. Auto-Billing Engine — Hours matched to care plan rates automatically.
3. Invoice Automation — Generate and send branded invoices automatically.
4. Lead Capture & Notification — Website leads trigger instant notifications.
5. AI-Written Care Summaries — Shift notes transformed into family-ready summaries.
6. WhatsApp Intake Bot — Handles inquiries on WhatsApp 24/7.
7. AI Chatbot (Website) — Qualifies leads and books calls while you sleep.
8. Scheduling & Coordination — Automated shift reminders and staff coordination.
9. Custom Conversion Website — Premium website connected to lead capture.

Pricing tiers (share only when asked):
- Automation Only: $3,500 setup + $500/month retainer — all 9 systems
- Automation + Website: $5,000 setup + $500/month retainer — all 9 systems + custom website

Key facts:
- Built and tested on a real home care agency (Proximity Care Services in Mississauga)
- Works for operators in Canada and the Philippines
- No tech skills needed — fully done-for-you
- Systems go live within 7–14 days

Conversation flow — follow this order:
1. Greet and ask what their biggest admin pain point is
2. Briefly acknowledge the pain point and mention how your systems solve it (1-2 sentences). Then ask for their agency name and city.
3. Ask for their phone number so Lance can reach out
4. Ask if they have any other questions before booking a discovery call
5. Once all info is collected, output the JSON block and confirm

Keep it to these steps. Do NOT ask about tech stack, number of caregivers, current software, or secondary pain points. Be concise — 2-3 sentences max per response.

LEAD COLLECTION — IMPORTANT:
Collect these four fields through the conversation flow above:
1. Agency name
2. City
3. Phone number
4. Biggest admin pain point

Once you have ALL four pieces of information AND have asked if they have other questions, output a hidden JSON block in EXACTLY this format on its own line, followed by a confirmation message:

<!--INTAKE_DATA:{"Agency_Name":"...","City":"...","Phone":"...","Pain_Point":"..."}-->

Where:
- Agency_Name: their home care agency name
- City: their city
- Phone: their phone number
- Pain_Point: their biggest admin pain point (e.g. "manual timesheets and billing")

Then write a short confirmation: thank them, tell them Lance will be in touch, and let them know they can pick a time for their discovery call right below.

CRITICAL: Do NOT output the JSON block until you have all four fields. The JSON block must be on its own line. Keep the whole conversation to 5-6 exchanges maximum.

Format your responses in plain text. You may use **bold** for emphasis. Keep it conversational and direct.`;

// ─── STATE ──────────────────────────────────────────────────
let conversationHistory = [];
let isProcessing = false;

// ─── DOM ELEMENTS ───────────────────────────────────────────
const messagesEl = document.getElementById('chatMessages');
const inputEl = document.getElementById('chatInput');
const sendBtn = document.getElementById('chatSend');
const quickRepliesEl = document.getElementById('quickReplies');
const errorBanner = document.getElementById('errorBanner');

// ─── AVATAR SVG ─────────────────────────────────────────────
const botAvatarSVG = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`;

// ─── HELPERS ────────────────────────────────────────────────
function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function formatMessage(text) {
  // Convert markdown-style links: [text](url)
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Convert **bold**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Convert line breaks to paragraphs
  const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
  if (paragraphs.length > 1) {
    return paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  }
  return text.replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'assistant') {
    div.innerHTML = `
      <div class="msg-avatar">${botAvatarSVG}</div>
      <div class="msg-bubble">${formatMessage(text)}</div>`;
  } else {
    div.innerHTML = `<div class="msg-bubble">${formatMessage(text)}</div>`;
  }

  messagesEl.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">${botAvatarSVG}</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showQuickReplies(replies) {
  quickRepliesEl.innerHTML = '';
  replies.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'quick-reply';
    btn.textContent = text;
    btn.addEventListener('click', () => {
      quickRepliesEl.innerHTML = '';
      sendMessage(text);
    });
    quickRepliesEl.appendChild(btn);
  });
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('visible');
  setTimeout(() => errorBanner.classList.remove('visible'), 8000);
}

// ─── AUTO-RESIZE INPUT ──────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ─── SEND MESSAGE ───────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim() || isProcessing) return;

  // Clear quick replies
  quickRepliesEl.innerHTML = '';
  errorBanner.classList.remove('visible');

  // Show user message
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  // Clear input
  inputEl.value = '';
  inputEl.style.height = 'auto';
  inputEl.focus();

  isProcessing = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 512,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    console.log('Proxy response status:', response.status);
    console.log('Proxy response headers:', Object.fromEntries(response.headers.entries()));

    const data = await response.json();
    console.log('Proxy response body:', JSON.stringify(data, null, 2));

    if (!response.ok) {
      throw new Error(data.error?.message || `API error (${response.status})`);
    }

    const rawReply = data.content?.[0]?.text || "I'm sorry, I had trouble responding. Please try again.";

    // Check for intake data JSON block and send to webhook
    // Use dotAll-style match to handle whitespace/newlines around the block
    const intakeMatch = rawReply.match(/<!--\s*INTAKE_DATA\s*:\s*(\{[\s\S]*?\})\s*-->/);
    console.log('Intake match result:', intakeMatch ? 'FOUND' : 'NOT FOUND');
    if (intakeMatch) {
      console.log('Raw intake JSON:', intakeMatch[1]);
    }

    let intakeSuccess = false;
    if (intakeMatch) {
      try {
        const raw = JSON.parse(intakeMatch[1]);
        const intakeData = {
          agency_name: raw.Agency_Name || raw.agency_name || '',
          city: raw.City || raw.city || '',
          phone: raw.Phone || raw.phone || '',
          pain_point: raw.Pain_Point || raw.pain_point || '',
          Status: 'New',
          Source: 'AI Chatbot Operator',
          Timestamp: new Date().toISOString()
        };
        console.log('Intake data collected:', intakeData);
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(intakeData)
        });
        console.log('Intake data sent to webhook successfully');
        intakeSuccess = true;
      } catch (webhookErr) {
        console.error('Webhook error:', webhookErr);
      }
    }

    // Strip the hidden JSON block before displaying
    let reply = rawReply.replace(/<!--\s*INTAKE_DATA\s*:\s*\{[\s\S]*?\}\s*-->\n?/, '').trim();

    hideTyping();

    // If intake was successful, show our own confirmation + Calendly embed
    if (intakeSuccess) {
      reply = "Perfect — you're all set. Pick a time below to book your free discovery call with Lance:";
      addMessage('assistant', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

      const embedDiv = document.createElement('div');
      embedDiv.className = 'calendly-embed';
      embedDiv.innerHTML = '<div class="calendly-inline-widget" data-url="https://calendly.com/lancesalazar56/discovery?hide_gdpr_banner=1"></div>';
      messagesEl.appendChild(embedDiv);
      scrollToBottom();

      // Load Calendly embed script if not already loaded
      if (!document.querySelector('script[src*="calendly.com"]')) {
        const script = document.createElement('script');
        script.src = 'https://assets.calendly.com/assets/external/widget.js';
        script.async = true;
        document.head.appendChild(script);
      } else {
        if (window.Calendly) window.Calendly.initInlineWidgets();
      }
    } else {
      addMessage('assistant', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
    }

  } catch (err) {
    hideTyping();
    console.error('Chat error:', err);
    showError('Something went wrong. Please try again.');
  } finally {
    isProcessing = false;
    sendBtn.disabled = false;
  }
}

// ─── EVENT LISTENERS ────────────────────────────────────────
sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});

// ─── WELCOME MESSAGE ────────────────────────────────────────
function init() {
  const greeting = "Hey there! Welcome to **Proximity Care Systems**. I help home care operators learn how our AI automation stack can streamline their business.\n\nWhat brings you here today?";

  addMessage('assistant', greeting);
  conversationHistory.push({ role: 'assistant', content: greeting });

  showQuickReplies([
    "I'm losing time on admin",
    "What systems do you offer?",
    "How much does it cost?",
    "Book a discovery call"
  ]);
}

init();
</script>
