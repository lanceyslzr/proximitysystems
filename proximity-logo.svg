<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 64" width="380" height="64">
  <defs>
    <style>
      .ps-wm { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 400; letter-spacing: 6px; fill: #f0ede8; }
      .ps-sub { font-family: 'Courier New', monospace; font-size: 8.5px; letter-spacing: 3.5px; fill: #5a9aaa; text-transform: uppercase; }
      .ps-wm-light { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 400; letter-spacing: 6px; fill: #13181c; }
      .ps-sub-light { font-family: 'Courier New', monospace; font-size: 8.5px; letter-spacing: 3.5px; fill: #3d7a8a; text-transform: uppercase; }
    </style>
  </defs>

  <!-- MARK — 64x64 -->
  <g>
    <rect width="56" height="56" x="4" y="4" rx="11" fill="#1B3A6B"/>
    <!-- Corner cut -->
    <polygon points="41,4 60,4 60,23" fill="#3d7a8a" opacity="0.45"/>
    <!-- P spine -->
    <rect x="12" y="11" width="7" height="42" rx="1" fill="#f0ede8"/>
    <!-- P top bar -->
    <rect x="19" y="11" width="19" height="7" fill="#f0ede8"/>
    <!-- P mid bar -->
    <rect x="19" y="29" width="19" height="7" fill="#f0ede8"/>
    <!-- P right bar -->
    <rect x="38" y="11" width="7" height="25" fill="#f0ede8"/>
    <!-- Dots 2x5 -->
    <circle cx="47" cy="40" r="2.2" fill="#5a9aaa"/>
    <circle cx="54" cy="40" r="2.2" fill="#5a9aaa"/>
    <circle cx="47" cy="47" r="2.2" fill="#5a9aaa"/>
    <circle cx="54" cy="47" r="2.2" fill="#5a9aaa"/>
    <circle cx="47" cy="54" r="2.2" fill="#3d7a8a" opacity="0.5"/>
    <circle cx="54" cy="54" r="2.2" fill="#3d7a8a" opacity="0.5"/>
    <!-- Bottom accent bar -->
    <line x1="12" y1="60" x2="32" y2="60" stroke="#3d7a8a" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
    <line x1="32" y1="60" x2="40" y2="60" stroke="#5a9aaa" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
  </g>

  <!-- WORDMARK — dark version (for dark backgrounds) -->
  <text x="78" y="30" class="ps-wm">PROXIMITY</text>
  <text x="79" y="46" class="ps-sub">Care Systems</text>
  <rect x="79" y="53" width="34" height="0.8" fill="#3d7a8a" opacity="0.5"/>
  <rect x="117" y="53" width="5" height="0.8" fill="#5a9aaa"/>
</svg>
